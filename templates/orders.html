<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — NexPC</title>
  <meta name="description" content="View your order history, track shipments, and manage returns on NexPC.">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pages.css') }}">
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────────── -->
<nav class="navbar" id="mainNav">
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon">🖥️</div>
    <span class="nav-logo-text">Nex<span>PC</span></span>
  </a>
  <div class="nav-links">
    <a href="/"                class="nav-link">Home</a>
    <a href="/cart"            class="nav-link nav-cart">🛒
      <span class="cart-badge" style="display:none">0</span>
    </a>
    <a href="/orders"          class="nav-link" style="color:var(--accent-light)">My Orders</a>
    <span id="navAuthArea" style="display:contents">
      <a href="/login"    class="nav-link">Sign In</a>
      <a href="/register" class="btn-nav-auth">Register →</a>
    </span>
  </div>
</nav>

<!-- ── Page Header ────────────────────────────────────────────── -->
<div class="page-header">
  <div class="breadcrumb">
    <a href="/">Home</a> <span>›</span> <span>My Orders</span>
  </div>
  <h1>My <span>Orders</span></h1>
  <p id="ordersCountLabel">Loading your order history…</p>
</div>

<!-- ── Page Body ──────────────────────────────────────────────── -->
<div class="page-body" style="max-width:1000px">

  <!-- Filter pills -->
  <div class="orders-filters" id="ordersFilters">
    <button class="filter-pill active" data-status="all">All Orders</button>
    <button class="filter-pill" data-status="placed">Placed</button>
    <button class="filter-pill" data-status="confirmed">Confirmed</button>
    <button class="filter-pill" data-status="processing">Processing</button>
    <button class="filter-pill" data-status="shipped">Shipped</button>
    <button class="filter-pill" data-status="delivered">Delivered</button>
    <button class="filter-pill" data-status="cancelled">Cancelled</button>
  </div>

  <!-- Order track mini-widget -->
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);
              padding:20px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
    <span style="font-size:20px">🔍</span>
    <div style="flex:1;min-width:200px">
      <div style="font-size:14px;font-weight:600;margin-bottom:4px">Track an Order</div>
      <div style="font-size:12px;color:var(--text-muted)">Enter any order number to check its status</div>
    </div>
    <div style="display:flex;gap:10px;flex-shrink:0;flex-wrap:wrap">
      <input type="text" id="trackInput" placeholder="e.g. ORD-20240329-A3F7"
             style="background:rgba(255,255,255,0.05);border:1.5px solid var(--border);
                    border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;
                    color:var(--text-primary);outline:none;min-width:220px;
                    font-family:'JetBrains Mono',monospace;transition:border-color .2s"
             id="trackInput">
      <button id="btnTrack" style="padding:10px 20px;background:var(--accent);border-radius:var(--radius-sm);
              color:#fff;font-size:13px;font-weight:600;transition:opacity .2s;
              box-shadow:0 4px 14px var(--accent-glow)">Track</button>
    </div>
    <div id="trackResult" style="width:100%;display:none"></div>
  </div>

  <!-- Orders list -->
  <div class="orders-list" id="ordersList">
    <div class="empty-state" id="ordersLoading">
      <div class="empty-icon">⏳</div>
      <p>Loading your orders…</p>
    </div>
  </div>

</div>


<!-- ── Order Detail Modal ──────────────────────────────────────── -->
<div class="checkout-overlay" id="orderDetailOverlay">
  <div class="checkout-panel" style="max-width:640px">
    <button class="checkout-close" id="closeOrderDetail">×</button>
    <h2>Order Details</h2>
    <div id="orderDetailContent" style="margin-top:20px">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<!-- ── Toast ──────────────────────────────────────────────────── -->
<div class="toast-container" id="toastContainer"></div>

<script src="{{ url_for('static', filename='js/orders.js') }}"></script>
</body>
</html>
